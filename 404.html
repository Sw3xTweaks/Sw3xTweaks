<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — SwexTweaks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%23818cf8'/><stop offset='100%25' stop-color='%23f472b6'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%230a0a0f'/><polygon points='55,10 20,55 48,55 45,90 80,45 52,45' fill='url(%23g)'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#000;color:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;overflow:hidden}
    body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:600px;background:radial-gradient(ellipse,rgba(99,102,241,0.15) 0%,transparent 65%);pointer-events:none}
    .wrap{text-align:center;position:relative;z-index:1}
    .code{font-size:clamp(6rem,20vw,10rem);font-weight:900;letter-spacing:-4px;background:linear-gradient(135deg,#818cf8,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .title{font-size:1.4rem;font-weight:800;margin-bottom:10px}
    .desc{color:#71717a;font-size:0.95rem;margin-bottom:32px;max-width:360px;margin-left:auto;margin-right:auto;line-height:1.6}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-home{display:inline-flex;align-items:center;gap:8px;background:#f5f5f7;color:#000;padding:12px 24px;border-radius:50px;font-weight:700;font-size:0.9rem;text-decoration:none;transition:background 0.15s,transform 0.15s}
    .btn-home:hover{background:#e5e5e7;transform:scale(1.02)}
    .btn-disc{display:inline-flex;align-items:center;gap:8px;background:#5865f2;color:#fff;padding:12px 24px;border-radius:50px;font-weight:700;font-size:0.9rem;text-decoration:none;transition:background 0.15s,transform 0.15s}
    .btn-disc:hover{background:#4752c4;transform:scale(1.02)}
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0}
  </style>
</head>
<body>
  <canvas class="particles" id="pc"></canvas>
  <div class="wrap">
    <div class="code">404</div>
    <h1 class="title">Sayfa Bulunamadı</h1>
    <p class="desc">Aradığın sayfa mevcut değil veya taşınmış olabilir. Ana sayfaya dönebilir ya da Discord'dan yardım alabilirsin.</p>
    <div class="btns">
      <a href="index.html" class="btn-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Ana Sayfaya Dön
      </a>
      <a href="https://discord.gg/R9S3CcvK6w" target="_blank" class="btn-disc">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </a>
    </div>
  </div>
  <script>
    const c=document.getElementById('pc'),ctx=c.getContext('2d');
    c.width=innerWidth;c.height=innerHeight;
    window.onresize=()=>{c.width=innerWidth;c.height=innerHeight};
    const pts=Array.from({length:40},()=>({x:Math.random()*c.width,y:Math.random()*c.height,dx:(Math.random()-.5)*.4,dy:(Math.random()-.5)*.4,r:Math.random()*1.5+.3}));
    function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(129,140,248,0.4)';ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>c.width)p.dx*=-1;if(p.y<0||p.y>c.height)p.dy*=-1});requestAnimationFrame(draw)}
    draw();
  </script>
</body>
</html>
