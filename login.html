<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwexTweaks — Giriş / Kayıt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%23818cf8'/><stop offset='100%25' stop-color='%23f472b6'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%230a0a0f'/><polygon points='55,10 20,55 48,55 45,90 80,45 52,45' fill='url(%23g)'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 600px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.15) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #71717a;
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .back:hover { color: #f5f5f7; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, rgba(129,140,248,0.2), rgba(244,114,182,0.2));
      border: 1px solid rgba(129,140,248,0.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #fff, #c4b5fd, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      color: #52525b;
      font-size: 0.85rem;
      margin-bottom: 28px;
      padding-left: 50px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(20px);
    }

    .tabs {
      display: flex;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: #71717a;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: rgba(255,255,255,0.1);
      color: #f5f5f7;
    }

    .panel { display: none; }
    .panel.show { display: block; }

    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #f5f5f7;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: rgba(129,140,248,0.6);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .field input::placeholder { color: #3f3f46; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #f5f5f7;
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:hover { background: #e5e5e7; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
    }
    .status.ok  { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); color: #34d399; }
    .status.err { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  color: #f87171; }

    .profile {
      display: none;
      text-align: center;
    }
    .profile-av {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 800; color: #fff;
      margin: 0 auto 12px;
      box-shadow: 0 0 30px rgba(99,102,241,0.35);
    }
    .profile h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
    .profile p  { color: #71717a; font-size: 0.85rem; margin-bottom: 16px; }
    .profile-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      color: #34d399;
      padding: 5px 12px; border-radius: 50px;
      font-size: 0.78rem; font-weight: 700;
      margin-bottom: 20px;
    }
    .btn-home {
      display: block; width: 100%;
      padding: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #a1a1aa;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem; font-weight: 600;
      text-decoration: none; text-align: center;
      margin-bottom: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-home:hover { border-color: rgba(255,255,255,0.2); color: #f5f5f7; }
    .btn-logout {
      width: 100%; padding: 11px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      color: #f87171;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.15); }

    .features {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 18px;
    }
    .feat {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.75rem; color: #52525b;
    }
    .feat span { color: #34d399; }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #3f3f46;
      font-size: 0.78rem;
    }
    .footer a { color: #52525b; text-decoration: none; }
    .footer a:hover { color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="wrap">

    <a href="index.html" class="back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Ana sayfaya dön
    </a>

    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
          <path d="M10 2L3 10H9L8 16L15 8H9L10 2Z" fill="url(#lg)" stroke="url(#lg)" stroke-width="0.5" stroke-linejoin="round"/>
          <defs><linearGradient id="lg" x1="3" y1="2" x2="15" y2="16" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#f472b6"/></linearGradient></defs>
        </svg>
      </div>
      <span class="logo-text">SwexTweaks</span>
    </a>
    <p class="tagline">PC optimizasyon topluluğuna katıl</p>

    <div class="card" id="auth-card">
      <div class="tabs">
        <button class="tab-btn active" id="btn-login" onclick="showTab('login')">Giriş Yap</button>
        <button class="tab-btn" id="btn-register" onclick="showTab('register')">Kayıt Ol</button>
      </div>

      <div class="panel show" id="panel-login">
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="l-email" placeholder="ornek@mail.com" />
        </div>
        <div class="field">
          <label>Şifre</label>
          <input type="password" id="l-pass" placeholder="••••••••" />
        </div>
        <button class="submit-btn" id="l-btn" onclick="doLogin()">Giriş Yap</button>
        <div class="status" id="l-status"></div>
      </div>

      <div class="panel" id="panel-register">
        <div class="field">
          <label>Kullanıcı Adı</label>
          <input type="text" id="r-name" placeholder="Kullanıcı adın" />
        </div>
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="r-email" placeholder="ornek@mail.com" />
        </div>
        <div class="field">
          <label>Şifre</label>
          <input type="password" id="r-pass" placeholder="En az 6 karakter" />
        </div>
        <button class="submit-btn" id="r-btn" onclick="doRegister()">Kayıt Ol</button>
        <div class="status" id="r-status"></div>
      </div>

      <div class="features">
        <div class="feat"><span>✓</span> Ücretsiz</div>
        <div class="feat"><span>✓</span> Güvenli</div>
        <div class="feat"><span>✓</span> Reklamsız</div>
        <div class="feat"><span>✓</span> Veri toplanmaz</div>
      </div>
    </div>

    <div class="card profile" id="profile-card">
      <div class="profile-av" id="p-av">?</div>
      <h3 id="p-name">Kullanıcı</h3>
      <p id="p-email">—</p>
      <div class="profile-badge">✓ Kayıtlı Üye</div>
      <a href="index.html" class="btn-home">Ana Sayfaya Dön</a>
      <button class="btn-logout" onclick="doLogout()">Çıkış Yap</button>
    </div>

    <div class="footer">
      © 2026 SwexTweaks &nbsp;·&nbsp;
      <a href="index.html#faq">SSS</a> &nbsp;·&nbsp;
      <a href="https://discord.gg/R9S3CcvK6w" target="_blank">Discord</a>
    </div>

  </div>

  <script>
    // HİÇ SUPABASE YOK - SADECE LOCALSTORAGE!
    
    function showTab(tab) {
      document.getElementById('btn-login').classList.toggle('active', tab === 'login');
      document.getElementById('btn-register').classList.toggle('active', tab === 'register');
      document.getElementById('panel-login').classList.toggle('show', tab === 'login');
      document.getElementById('panel-register').classList.toggle('show', tab === 'register');
    }

    function setStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'status ' + type;
      el.style.display = 'block';
    }

    // KAYIT - SADECE LOCALSTORAGE (SUPABASE YOK!)
    function doRegister() {
      const name  = document.getElementById('r-name').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const pass  = document.getElementById('r-pass').value;

      if (!name || !email || !pass) { 
        setStatus('r-status', '⚠️ Tüm alanları doldur.', 'err'); 
        return; 
      }
      if (pass.length < 6) { 
        setStatus('r-status', '⚠️ Şifre en az 6 karakter olmalı.', 'err'); 
        return; 
      }

      const btn = document.getElementById('r-btn');
      btn.disabled = true; 
      btn.textContent = 'Kayıt olunuyor...';

      // Kullanıcıları localStorage'dan al
      const users = JSON.parse(localStorage.getItem('swex_users') || '[]');
      const existingUser = users.find(u => u.email === email);
      
      if (existingUser) {
        setStatus('r-status', '❌ Bu email adresi zaten kayıtlı.', 'err');
        btn.disabled = false; 
        btn.textContent = 'Kayıt Ol';
        return;
      }

      // Yeni kullanıcı oluştur
      const newUser = {
        id: Date.now(),
        username: name,
        email: email,
        password: pass,
        created_at: new Date().toISOString()
      };
      
      // localStorage'a kaydet
      users.push(newUser);
      localStorage.setItem('swex_users', JSON.stringify(users));

      setStatus('r-status', '✅ Kayıt başarılı! Şimdi giriş yapabilirsin.', 'ok');
      btn.disabled = false; 
      btn.textContent = 'Kayıt Ol';
      
      // Formu temizle
      document.getElementById('r-name').value = '';
      document.getElementById('r-email').value = '';
      document.getElementById('r-pass').value = '';
      
      // 2 saniye sonra login paneline geç
      setTimeout(() => {
        showTab('login');
        document.getElementById('l-email').value = email;
      }, 2000);
    }

    // GİRİŞ - SADECE LOCALSTORAGE (SUPABASE YOK!)
    function doLogin() {
      const email = document.getElementById('l-email').value.trim();
      const pass  = document.getElementById('l-pass').value;
      
      if (!email || !pass) { 
        setStatus('l-status', '⚠️ Tüm alanları doldur.', 'err'); 
        return; 
      }

      const btn = document.getElementById('l-btn');
      btn.disabled = true; 
      btn.textContent = 'Giriş yapılıyor...';

      // localStorage'dan kullanıcıları kontrol et
      const users = JSON.parse(localStorage.getItem('swex_users') || '[]');
      const user = users.find(u => u.email === email && u.password === pass);

      if (user) {
        localStorage.setItem('swex_current_user', JSON.stringify(user));
        showProfile(user);
      } else {
        setStatus('l-status', '❌ E-posta veya şifre hatalı.', 'err');
        btn.disabled = false; 
        btn.textContent = 'Giriş Yap';
      }
    }

    // ÇIKIŞ - SADECE LOCALSTORAGE (SUPABASE YOK!)
    function doLogout() {
      localStorage.removeItem('swex_current_user');
      document.getElementById('profile-card').style.display = 'none';
      document.getElementById('auth-card').style.display = 'block';
    }

    // PROFİL GÖSTER - SADECE LOCALSTORAGE (SUPABASE YOK!)
    function showProfile(user) {
      document.getElementById('auth-card').style.display = 'none';
      const pc = document.getElementById('profile-card');
      pc.style.display = 'block';
      const name = user.username || user.email.split('@')[0];
      document.getElementById('p-name').textContent = name;
      document.getElementById('p-email').textContent = user.email;
      document.getElementById('p-av').textContent = name[0].toUpperCase();
    }

    // Enter tuşu desteği
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginVisible = document.getElementById('panel-login').classList.contains('show');
      if (loginVisible) doLogin();
      else doRegister();
    });

    // Sayfa açılınca oturum kontrol
    window.addEventListener('load', () => {
      const currentUser = JSON.parse(localStorage.getItem('swex_current_user') || 'null');
      if (currentUser) {
        showProfile(currentUser);
      }
    });
  </script>
</body>
</html>
